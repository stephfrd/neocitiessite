const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

/* ───────── CANVAS SETUP (FIXED) ───────── */
const sky = document.getElementById("sky");
const bg = document.getElementById("bg");
const main = document.getElementById("main");

const bgCtx = bg.getContext("2d");
const ctx = main.getContext("2d");

let W = 0, H = 0;
let bgStars = [];
let t = 0;

function resize() {
  const rect = sky.getBoundingClientRect(); // 🔥 FIX
  W = rect.width;
  H = rect.height;

  bg.width = main.width = W;
  bg.height = main.height = H;

  makeStars();
}

function makeStars() {
  bgStars = [];

  const count = Math.max(250, Math.floor(W * H / 1200)); // 🔥 GUARANTEED

  for (let i = 0; i < count; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      op: Math.random() * 0.8 + 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawBg() {
  bgCtx.clearRect(0, 0, W, H);

  bgStars.forEach(s => {
    const flicker = Math.sin(t * 0.02 + s.phase) * 0.3;

    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(255,255,255,${s.op + flicker})`;
    bgCtx.fill();
  });
}

function drawConstellations() {
  ctx.clearRect(0, 0, W, H);

  constellations.forEach(con => {

    function pos(i){
      return {
        x: (con.cx + con.stars[i][0]) * W,
        y: (con.cy + con.stars[i][1]) * H
      };
    }

    con.lines.forEach(([a,b])=>{
      const p1 = pos(a), p2 = pos(b);
      ctx.beginPath();
      ctx.moveTo(p1.x,p1.y);
      ctx.lineTo(p2.x,p2.y);
      ctx.strokeStyle = "rgba(180,120,255,0.6)";
      ctx.stroke();
    });

    con.stars.forEach((_,i)=>{
      const p = pos(i);
      ctx.beginPath();
      ctx.arc(p.x,p.y,3,0,Math.PI*2);
      ctx.fillStyle = "#fff";
      ctx.fill();
    });

  });
}

const panel = document.getElementById("panel");

function openPanel(con){
  document.getElementById("panel-symbol").textContent = con.symbol;
  document.getElementById("panel-title-text").textContent = con.name;

  const ul = document.getElementById("panel-links");
  ul.innerHTML = "";

  con.items.forEach(item=>{
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = item.href;
    a.textContent = item.label;
    li.appendChild(a);
    ul.appendChild(li);
  });

  document.getElementById("panel-goto").href = con.page;

  panel.style.display = "block";
  requestAnimationFrame(()=>panel.classList.add("visible"));
}

document.getElementById("panel-close").onclick = () => {
  panel.classList.remove("visible");
  setTimeout(()=>panel.style.display="none",200);
};

main.addEventListener("click", e=>{
  const rect = main.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  constellations.forEach(con=>{
    con.stars.forEach(s=>{
      const x = (con.cx + s[0]) * W;
      const y = (con.cy + s[1]) * H;

      if (Math.hypot(mx-x,my-y) < 12){
        openPanel(con);
      }
    });
  });
});

function loop(){
  t++;
  drawBg();
  drawConstellations();
  requestAnimationFrame(loop);
}

window.addEventListener("resize", resize);
resize();
loop();

</script>
